<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Финансы</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ─── RESET & BASE ─────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{
  background:#0c0c10;color:#eeeef5;
  font-family:-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;
}

/* ─── CSS VARS ─────────────────────────────────────────────────────────── */
:root{
  --bg0:#0c0c10;--bg1:#131318;--bg2:#1a1a22;--bg3:#222230;--bg4:#2c2c3c;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#eeeef5;--text2:#9898b0;--text3:#55556a;
  --accent:#6c5ce7;--accent-light:#8b7ff0;
  --green:#00c896;--red:#ff4d6d;--amber:#ffb347;--blue:#4da6ff;
  --r:14px;--rs:8px;
}

/* ─── LOCK SCREEN ──────────────────────────────────────────────────────── */
#lock{
  position:fixed;inset:0;background:var(--bg0);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;padding:20px;
}
.lock-card{
  width:100%;max-width:360px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px;padding:36px 32px;text-align:center;
}
.lock-icon{font-size:40px;margin-bottom:16px}
.lock-title{font-size:22px;font-weight:700;letter-spacing:-0.4px;margin-bottom:6px}
.lock-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.lock-input{
  width:100%;height:48px;padding:0 16px;
  background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:var(--rs);color:var(--text);font-size:16px;
  outline:none;text-align:center;letter-spacing:0.1em;
  transition:border-color .2s;margin-bottom:14px;
}
.lock-input:focus{border-color:var(--accent)}
.lock-btn{
  width:100%;height:48px;background:var(--accent);border:none;
  border-radius:var(--rs);color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .2s;
}
.lock-btn:hover{opacity:.85}
.lock-error{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}

/* ─── APP LAYOUT ───────────────────────────────────────────────────────── */
#app{display:none;flex-direction:column;min-height:100vh}
.app-inner{max-width:960px;margin:0 auto;width:100%;padding:0 16px}

/* ─── HEADER ───────────────────────────────────────────────────────────── */
header{
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  background:rgba(12,12,16,.92);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.header-inner{
  max-width:960px;margin:0 auto;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#4da6ff);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.logo-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
.header-meta{font-size:11px;color:var(--text3);text-align:right;line-height:1.5}

/* ─── MONTH PILLS ──────────────────────────────────────────────────────── */
.month-wrap{
  overflow-x:auto;scrollbar-width:none;
  padding:14px 0 10px;margin-bottom:4px;
}
.month-wrap::-webkit-scrollbar{display:none}
.month-row{display:flex;gap:6px;padding:0 16px}
.mpill{
  padding:6px 14px;border-radius:100px;font-size:13px;font-weight:500;
  border:1px solid var(--border);background:var(--bg2);color:var(--text2);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;
}
.mpill:hover{border-color:var(--accent-light);color:var(--text)}
.mpill.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ─── NAV ──────────────────────────────────────────────────────────────── */
.nav-wrap{
  display:flex;gap:2px;background:var(--bg2);border-radius:var(--rs);
  padding:3px;margin:0 16px 20px;overflow-x:auto;scrollbar-width:none;
}
.nav-wrap::-webkit-scrollbar{display:none}
.nbtn{
  padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;
  border:none;background:none;color:var(--text2);cursor:pointer;
  flex-shrink:0;transition:all .15s;white-space:nowrap;
}
.nbtn:hover{color:var(--text)}
.nbtn.on{background:var(--bg4);color:var(--text)}

/* ─── PAGES ────────────────────────────────────────────────────────────── */
.page{display:none;padding:0 16px 32px}
.page.on{display:block}

/* ─── METRICS ──────────────────────────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(min-width:580px){.metrics{grid-template-columns:repeat(4,1fr)}}
.mc{
  background:var(--bg2);border-radius:var(--r);padding:14px 16px;
  border:1px solid var(--border);position:relative;overflow:hidden;
}
.mc::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
}
.mc.cg::after{background:var(--green)}
.mc.cr::after{background:var(--red)}
.mc.ca::after{background:var(--amber)}
.mc.cb::after{background:var(--blue)}
.mc-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.mc-val{font-size:20px;font-weight:700;letter-spacing:-.4px}
.mc-val.g{color:var(--green)}.mc-val.r{color:var(--red)}.mc-val.a{color:var(--amber)}.mc-val.b{color:var(--blue)}
.mc-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ─── CARD ─────────────────────────────────────────────────────────────── */
.card{background:var(--bg2);border-radius:var(--r);padding:18px;border:1px solid var(--border);margin-bottom:14px}
.card-hdr{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.card-hdr em{color:var(--text2);font-style:normal;font-weight:400;text-transform:none;letter-spacing:0;font-size:12px}

/* ─── GRID ─────────────────────────────────────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:680px){.g2{grid-template-columns:1fr 1fr}}

/* ─── BARS ─────────────────────────────────────────────────────────────── */
.bars{display:flex;flex-direction:column;gap:9px}
.brow{display:flex;align-items:center;gap:8px}
.blabel{width:108px;flex-shrink:0;font-size:12px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrack{flex:1;height:16px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bfill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bamt{width:76px;flex-shrink:0;font-size:12px;font-weight:600;text-align:right}
@media(max-width:400px){.blabel{width:80px;font-size:11px}.bamt{width:62px;font-size:11px}}

/* ─── DONUT LEGEND ─────────────────────────────────────────────────────── */
.dleg{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.dleg-row{display:flex;align-items:center;gap:8px;font-size:12px}
.dleg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dleg-name{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dleg-amt{font-weight:600}
.dleg-pct{color:var(--text3);font-size:11px;width:32px;text-align:right}

/* ─── CHART WRAP ───────────────────────────────────────────────────────── */
.cw{position:relative;width:100%}

/* ─── TREND BADGES ─────────────────────────────────────────────────────── */
.trend{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:600;padding:2px 6px;border-radius:100px}
.t-up{background:rgba(255,77,109,.12);color:var(--red)}
.t-dn{background:rgba(0,200,150,.12);color:var(--green)}
.t-eq{background:rgba(152,152,176,.1);color:var(--text2)}

/* ─── CATEGORY RANK ────────────────────────────────────────────────────── */
.crank{display:flex;flex-direction:column;gap:7px}
.crow{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--bg3);border-radius:var(--rs);cursor:default;
  border:1px solid transparent;transition:border-color .15s;
}
.crow:hover{border-color:var(--border2)}
.crow-n{width:18px;font-size:12px;color:var(--text3);font-weight:700;flex-shrink:0}
.crow-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.crow-name{flex:1;font-size:13px;font-weight:500}
.crow-pct{font-size:12px;color:var(--text2);width:34px;text-align:right}
.crow-amt{font-size:13px;font-weight:700;width:86px;text-align:right}

/* ─── MONTHLY TABLE ────────────────────────────────────────────────────── */
.mtbl-wrap{overflow-x:auto;border-radius:var(--rs);border:1px solid var(--border)}
.mtbl{width:100%;border-collapse:collapse;font-size:12px;min-width:480px}
.mtbl th{
  padding:9px 10px;text-align:right;font-size:11px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;color:var(--text3);
  background:var(--bg3);white-space:nowrap;border-bottom:1px solid var(--border);
}
.mtbl th:first-child{text-align:left}
.mtbl td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--border)}
.mtbl tr:last-child td{border-bottom:none}
.mtbl td:first-child{text-align:left;font-weight:500}
.mtbl tr:hover td{background:rgba(255,255,255,.02)}
.h0{color:var(--text2)}.h1{color:var(--amber)}.h2{color:var(--red)}

/* ─── TRANSACTIONS ─────────────────────────────────────────────────────── */
.tf{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.ti{
  flex:1;min-width:130px;height:38px;padding:0 12px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text);font-size:13px;outline:none;
}
.ti:focus{border-color:var(--accent)}
select.ti{cursor:pointer}
option{background:var(--bg3)}
.tsummary{font-size:12px;color:var(--text2);margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap}
.tsummary strong{color:var(--text)}
.ttbl-wrap{overflow-x:auto;border-radius:var(--rs);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  padding:9px 12px;text-align:left;font-size:11px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;color:var(--text3);
  background:var(--bg3);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody td{padding:9px 12px;vertical-align:middle}
.td-date{color:var(--text2);white-space:nowrap;font-size:12px}
.td-desc{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:520px){.td-desc{max-width:110px}}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap}
.td-amt{text-align:right;font-weight:700;white-space:nowrap}
.aneg{color:var(--red)}.apos{color:var(--green)}

/* ─── PAGINATION ───────────────────────────────────────────────────────── */
.pag{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px}
.pbtn{
  width:32px;height:32px;border-radius:7px;border:1px solid var(--border);
  background:var(--bg2);color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.pbtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.pbtn:disabled{opacity:.3;cursor:default}
.pinfo{font-size:13px;color:var(--text2)}

/* ─── INSIGHTS ─────────────────────────────────────────────────────────── */
.insight-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px}
@media(min-width:600px){.insight-grid{grid-template-columns:1fr 1fr}}
.insight{
  background:var(--bg2);border-radius:var(--r);padding:16px;
  border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;
}
.insight-icon{font-size:24px;flex-shrink:0}
.insight-label{font-size:11px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.insight-val{font-size:16px;font-weight:700;letter-spacing:-.3px}
.insight-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* ─── MISC ─────────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.sep{height:20px}
</style>
</head>

      onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">Войти</button>
    <div class="lock-error" id="perr"></div>
  </div>
</div>

<!-- ═══════════════════ APP ════════════════════════════════════════════════ -->
<div id="app">

  </div>

  <!-- OVERVIEW -->
  <div id="p-overview" class="page on">
    <div class="metrics" id="ov-m"></div>

      <div class="card">
        <div class="card-hdr">Топ расходов</div>
        <div class="bars" id="ov-bars"></div>

    </div>
  </div>

  <!-- INSIGHTS -->
  <div id="p-insights" class="page">
    <div class="insight-grid" id="ins-grid"></div>
    <div class="card">
      <div class="card-hdr">Динамика ключевых категорий</div>
      <div class="cw" style="height:240px"><canvas id="c-lines"></canvas></div>
    </div>
    <div class="card">
      <div class="card-hdr">Сравнение месяц к месяцу</div>
      <div id="ins-compare"></div>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div id="p-categories" class="page">
    <div class="card">
      <div class="card-hdr">Расходы по категориям <em id="cat-lbl"></em></div>
      <div class="cw" id="cat-cw" style="height:340px"><canvas id="c-cat"></canvas></div>
    </div>
    <div class="card">
      <div class="card-hdr">Рейтинг категорий</div>
      <div class="crank" id="crank"></div>
    </div>
  </div>

  <!-- MONTHLY -->
  <div id="p-monthly" class="page">
    <div class="card">
      <div class="card-hdr">Расходы по категориям — помесячно</div>
      <div class="cw" style="height:280px"><canvas id="c-stack"></canvas></div>
    </div>
    <div class="card">
      <div class="card-hdr">Сравнительная таблица</div>
      <div class="mtbl-wrap"><table class="mtbl" id="mtbl"></table></div>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div id="p-tx" class="page">
    <div class="tf">
      <input type="text" class="ti" id="ts" placeholder="🔍 Поиск..." oninput="renderTx()" style="min-width:150px">
      <select class="ti" id="tm" onchange="renderTx()" style="max-width:150px">
        <option value="all">Все месяцы</option>
      </select>
      <select class="ti" id="tc" onchange="renderTx()" style="max-width:170px">
        <option value="all">Все категории</option>
      </select>
      <select class="ti" id="tt" onchange="renderTx()" style="max-width:130px">
        <option value="all">Все типы</option>
        <option value="Расход">Расходы</option>
        <option value="Доход">Доходы</option>
      </select>
    </div>
    <div class="tsummary" id="tsum"></div>
    <div class="ttbl-wrap">
      <table>
        <thead><tr>
          <th>Дата</th><th>Описание</th><th>Категория</th>
          <th style="text-align:right">Сумма</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pag" id="tpag"></div>
  </div>
</div>

const PAL = ['#6c5ce7','#e84d6f','#00c896','#ffb347','#4da6ff','#ff7b6b',
             '#00b87a','#ffd166','#74b9ff','#fd79a8','#55efc4','#fdcb6e',
             '#a29bfe','#81ecec','#fab1a0','#e17055'];
const CC = {}; let ci = 0;
function cc(c){if(!CC[c])CC[c]=PAL[ci++%PAL.length];return CC[c];}

// HELPERS
// ════════════════════════════════════════════════════════════════════════════
const fmt = n => Math.round(Math.abs(n)).toLocaleString('ru-RU') + ' ₽';
const fmtK = n => { const v=Math.round(Math.abs(n)); return v>=10000?Math.round(v/1000)+'к':v>0?v.toLocaleString('ru-RU'):'—'; };
const fmtKK = n => Math.round(Math.abs(n))>=1000 ? Math.round(Math.abs(n)/1000)+'к' : Math.round(Math.abs(n));

function filter(m,cat='all',type='all',q=''){
  return TX.filter(t=>{
    if(m!=='all'&&t.m!==m)return false;
    if(cat!=='all'&&t.c!==cat)return false;
    if(type!=='all'&&t.t!==type)return false;
    if(q&&!t.desc.toLowerCase().includes(q.toLowerCase())&&!t.c.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });
}
function catTotals(txs,skip=true){
  const m={};
  txs.forEach(t=>{
    if(t.t!=='Расход')return;
    if(skip&&SKIP.has(t.c))return;
    m[t.c]=(m[t.c]||0)+Math.abs(t.a);
  });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function mTotal(mo,cat,type='Расход'){
  return TX.filter(t=>t.m===mo&&t.c===cat&&t.t===type).reduce((s,t)=>s+Math.abs(t.a),0);
}
function mSum(mo,type){
  return TX.filter(t=>t.m===mo&&t.t===type).reduce((s,t)=>s+Math.abs(t.a),0);
}

function unlock(){
  const v = document.getElementById('pwd').value;
  if(v === PASSWORD){
    document.getElementById('lock').style.display='none';

// INIT

function init(){
  document.getElementById('hmeta').innerHTML = TX.length+' транзакций<br>'+MONTHS[0].replace('.','/20')+' — '+MONTHS[MONTHS.length-1].replace('.','/20');

  const mr = document.getElementById('month-row');
  mr.innerHTML = '<button class="mpill on" onclick="setM(\'all\',this)">Все</button>';
  MONTHS.forEach(m=>{
    const b=document.createElement('button');
    b.className='mpill';
    b.textContent=ML[m];
    b.onclick=function(){setM(m,this);};
    mr.appendChild(b);
  });

  const ts=document.getElementById('tm');
  MONTHS.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=ML[m];ts.appendChild(o);});
  const tc=document.getElementById('tc');
  [...new Set(TX.map(t=>t.c))].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;tc.appendChild(o);});

  renderOverview();
}

function setM(m,btn){
  AM=m;
  document.querySelectorAll('.mpill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const pg=document.querySelector('.page.on');
  if(pg){'p-overview p-insights p-categories p-monthly'.split(' ').forEach(id=>{if(document.getElementById(id)===pg)eval('render'+id.replace('p-','').replace(/\b\w/g,c=>c.toUpperCase())()+'()');});;}
  renderActive();
}
function renderActive(){
  const pg=document.querySelector('.page.on');
  if(!pg)return;
  const id=pg.id;
  if(id==='p-overview')renderOverview();
  if(id==='p-insights')renderInsights();
  if(id==='p-categories')renderCategories();
  if(id==='p-monthly')renderMonthly();
}

function nav(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='overview')renderOverview();
  if(id==='insights')renderInsights();
  if(id==='categories')renderCategories();
  if(id==='monthly')renderMonthly();
  if(id==='tx')renderTx();
}

// INSIGHTS
// ════════════════════════════════════════════════════════════════════════════
function renderInsights(){
  const last2=MONTHS.slice(-2);
  const prev=last2[0],curr=last2[1];
  const prevExp=TX.filter(t=>t.m===prev&&t.t==='Расход'&&!SKIP.has(t.c)).reduce((s,t)=>s+Math.abs(t.a),0);
  const currExp=TX.filter(t=>t.m===curr&&t.t==='Расход'&&!SKIP.has(t.c)).reduce((s,t)=>s+Math.abs(t.a),0);
  const delta=currExp-prevExp;
  const pct=prevExp>0?Math.round(Math.abs(delta)/prevExp*100):0;

  const allExp=TX.filter(t=>t.t==='Расход'&&!SKIP.has(t.c)).reduce((s,t)=>s+Math.abs(t.a),0);
  const avgMo=Math.round(allExp/MONTHS.length);
  const mostExpCat=catTotals(TX)[0];
  const foodCafeMo=MONTHS.map(m=>mTotal(m,'Продукты')+mTotal(m,'Кафе и рестораны'));
  const avgFood=Math.round(foodCafeMo.reduce((s,v)=>s+v,0)/MONTHS.length);
  const fuelMo=MONTHS.map(m=>mTotal(m,'Топливо'));
  const avgFuel=Math.round(fuelMo.reduce((s,v)=>s+v,0)/MONTHS.length);

  document.getElementById('ins-grid').innerHTML=`
    <div class="insight"><div class="insight-icon">📊</div><div><div class="insight-label">Ср. расходы/мес</div><div class="insight-val">${fmt(avgMo)}</div><div class="insight-sub">без переводов и инвестиций</div></div></div>
    <div class="insight"><div class="insight-icon">${delta<=0?'📉':'📈'}</div><div><div class="insight-label">${ML[curr]} vs ${ML[prev]}</div><div class="insight-val" style="color:${delta<=0?'var(--green)':'var(--red)}'}">${delta<=0?'-':'+'}${fmt(Math.abs(delta))}</div><div class="insight-sub">${pct}% ${delta<=0?'экономия':'перерасход'}</div></div></div>
    <div class="insight"><div class="insight-icon">🏆</div><div><div class="insight-label">Топ категория</div><div class="insight-val">${mostExpCat?mostExpCat[0]:'—'}</div><div class="insight-sub">${mostExpCat?fmt(mostExpCat[1])+' за всё время':'—'}</div></div></div>
    <div class="insight"><div class="insight-icon">🍽️</div><div><div class="insight-label">Еда ср./мес</div><div class="insight-val">${fmt(avgFood)}</div><div class="insight-sub">продукты + кафе</div></div></div>
    <div class="insight"><div class="insight-icon">⛽</div><div><div class="insight-label">Топливо ср./мес</div><div class="insight-val">${fmt(avgFuel)}</div><div class="insight-sub">заправки</div></div></div>
    <div class="insight"><div class="insight-icon">🔄</div><div><div class="insight-label">Всего транзакций</div><div class="insight-val">${TX.length}</div><div class="insight-sub">${MONTHS.length} месяцев</div></div></div>`;

  const LCATS=['Продукты','Кафе и рестораны','Топливо','Услуги'];
  if(CH.ln){CH.ln.destroy();}
  CH.ln=new Chart(document.getElementById('c-lines'),{
    type:'line',
    data:{labels:MONTHS.map(m=>ML[m]),datasets:LCATS.map(cat=>({
      label:cat,data:MONTHS.map(m=>Math.round(mTotal(m,cat))),
      borderColor:cc(cat),backgroundColor:cc(cat)+'22',
      borderWidth:2,pointRadius:4,pointBackgroundColor:cc(cat),
      tension:0.3,fill:false
    }))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}},
      scales:{x:{grid:{color:'#ffffff08'},ticks:{color:'#9898b0'}},y:{grid:{color:'#ffffff08'},ticks:{color:'#9898b0',callback:v=>fmtKK(v)}}}}
  });

  const TOP=['Продукты','Кафе и рестораны','Топливо','Транспорт','Услуги'];
  document.getElementById('ins-compare').innerHTML=TOP.map(cat=>{
    const v1=mTotal(prev,cat),v2=mTotal(curr,cat);
    const d=v2-v1,p=v1>0?Math.round(Math.abs(d)/v1*100):0;
    const tr=d===0?`<span class="trend t-eq">= ${p}%</span>`:d>0?`<span class="trend t-up">▲ ${p}%</span>`:`<span class="trend t-dn">▼ ${p}%</span>`;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="width:8px;height:8px;border-radius:50%;background:${cc(cat)};flex-shrink:0;display:inline-block"></span>

        const mx=Math.max(...vals);
        return `<tr><td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${cc(cat)};margin-right:7px"></span>${cat}</td>
          ${vals.map(v=>`<td class="${v>=mx*.85&&v>0?'h2':v>=mx*.5&&v>0?'h1':'h0'}">${fmtK(v)}</td>`).join('')}
          <td style="color:var(--text2)">${fmtK(avg)}</td></tr>`;
      }).join('')}
      <tr style="border-top:2px solid var(--border2);font-weight:700">
        <td>Итого</td>
        ${mTots.map(v=>`<td style="color:var(--text)">${fmtK(v)}</td>`).join('')}
        <td style="color:var(--text2)">${fmtK(mTots.reduce((s,v)=>s+v,0)/MONTHS.length)}</td>
      </tr>
    </tbody>`;
}

// ════════════════════════════════════════════════════════════════════════════
// TRANSACTIONS
// ════════════════════════════════════════════════════════════════════════════
function renderTx(){txP=0;txPage();}
function txPage(){
  const m=document.getElementById('tm').value;
  const cat=document.getElementById('tc').value;
  const type=document.getElementById('tt').value;
  const q=document.getElementById('ts').value;
  const f=filter(m,cat,type,q).reverse();
  const tE=f.filter(t=>t.t==='Расход').reduce((s,t)=>s+Math.abs(t.a),0);
  const tI=f.filter(t=>t.t==='Доход').reduce((s,t)=>s+t.a,0);
  document.getElementById('tsum').innerHTML=
    `<span>Найдено: <strong>${f.length}</strong></span>`+
    `<span>Расходы: <strong style="color:var(--red)">${fmt(tE)}</strong></span>`+
    `<span>Доходы: <strong style="color:var(--green)">${fmt(tI)}</strong></span>`;
  const page=f.slice(txP*PS,(txP+1)*PS);
  const ci2={};let ii=0;
  document.getElementById('tbody').innerHTML=page.map(t=>{
    if(!ci2[t.c])ci2[t.c]=ii++;
    const bcl='badge';
    const col=cc(t.c);
    return `<tr>
      <td class="td-date">${t.d}</td>
      <td class="td-desc">${t.desc}</td>
      <td><span class="${bcl}" style="background:${col}22;color:${col}">${t.c}</span></td>
      <td class="td-amt ${t.a<0?'aneg':'apos'}">${t.a<0?'−':'+'} ${fmt(Math.abs(t.a))}</td>
    </tr>`;
  }).join('');
  const tot=Math.ceil(f.length/PS);
  document.getElementById('tpag').innerHTML=`
    <button class="pbtn" onclick="txP=Math.max(0,txP-1);txPage()" ${txP===0?'disabled':''}>‹</button>
    <span class="pinfo">${txP+1} / ${Math.max(1,tot)}</span>
    <button class="pbtn" onclick="txP=Math.min(${tot-1},txP+1);txPage()" ${txP>=tot-1?'disabled':''}>›</button>`;
}
</script>
</body>
